<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Rei Icons</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
:root{--bg:#111113;--sf:#18181b;--s2:#222227;--s3:#2a2a30;--bd:#2e2e35;--tx:#f0eff4;--mt:#7a7a8a;--ac:#e05c2a;--ag:rgba(224,92,42,.18);--ai:#7c6af7;--aig:rgba(124,106,247,.2);--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.material-symbols-rounded{font-family:'Material Symbols Rounded'!important;font-weight:normal!important;font-style:normal!important;line-height:1;letter-spacing:normal!important;text-transform:none!important;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;font-feature-settings:'liga'!important;-webkit-font-feature-settings:'liga'!important;-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 48!important}

/* Header */
header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;gap:10px}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.02em;flex-shrink:0}
.brand span{color:var(--ac)}
.src-tabs{display:flex;gap:2px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:3px;overflow-x:auto;scrollbar-width:none}
.src-tabs::-webkit-scrollbar{display:none}
.st{padding:4px 8px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--mt);border-radius:5px;cursor:pointer;transition:all .15s;border:none;background:none;white-space:nowrap;flex-shrink:0}
.st.on{background:var(--ac);color:#fff}

/* Layout */
.ws{display:grid;grid-template-columns:1fr 320px;flex:1;min-height:0;overflow:hidden}

/* Preview */
.pv{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px 20px;position:relative;overflow:hidden}
.pv::before{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(224,92,42,.06) 0%,transparent 65%);pointer-events:none}

/* Canvas wrapper */
#cvs{position:relative;z-index:1;user-select:none}
#cvsBg{position:relative;overflow:hidden;transition:border-radius .25s,box-shadow .25s,background .25s;touch-action:none}
.layer-el{position:absolute;transform-origin:center;cursor:grab;transition:outline .1s;outline:1.5px solid transparent;outline-offset:2px;display:flex;align-items:center;justify-content:center;touch-action:none}
.layer-el.sel{outline-color:rgba(255,255,255,.55)!important}
.layer-el:active{cursor:grabbing}
.layer-el.locked{cursor:default}

/* Snap guides */
.snap-h,.snap-v{position:absolute;background:rgba(255,255,255,.5);pointer-events:none;z-index:99;opacity:0;transition:opacity .1s}
.snap-h{left:0;right:0;height:1px;top:50%}
.snap-v{top:0;bottom:0;width:1px;left:50%}

/* Info bar */
.info{display:flex;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;background:var(--sf);position:relative;z-index:1;flex-shrink:0}
.ic{padding:7px 10px;border-right:1px solid var(--bd);display:flex;flex-direction:column;gap:2px}
.ic:last-child{border-right:none}
.ic-l{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mt);font-family:'IBM Plex Mono',monospace}
.ic-v{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx);font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Panel */
.panel{background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.panel-body{flex:1;overflow-y:auto;padding:12px 12px;display:flex;flex-direction:column;gap:12px}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* Layer strip */
.layer-strip{border-top:1px solid var(--bd);padding:8px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;background:var(--s2)}
.layer-strip-hdr{display:flex;align-items:center;justify-content:space-between}
.layer-strip-title{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mt)}
.layer-actions{display:flex;gap:3px}
.la{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--s3);border:1px solid var(--bd);border-radius:6px;cursor:pointer;color:var(--mt);transition:all .15s;flex-shrink:0}
.la:hover{border-color:var(--ac);color:var(--ac)}
.la .material-icons-round{font-size:14px}
.layer-list{display:flex;gap:6px;overflow-x:auto;padding:2px 0}
.layer-list::-webkit-scrollbar{height:3px}
.layer-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.lcard{flex-shrink:0;width:52px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:var(--s3);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .15s;position:relative}
.lcard.sel{border-color:var(--ac);background:var(--ag)}
.lcard-icon{font-size:20px;color:var(--tx);line-height:1;width:24px;height:24px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.lcard-name{font-size:8px;color:var(--mt);font-family:'IBM Plex Mono',monospace;text-align:center;max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lcard-vis{position:absolute;top:3px;right:3px;font-size:10px;color:var(--mt)}
.lcard .material-icons-round{font-size:20px}

/* Sections */
.sec{display:flex;flex-direction:column;gap:6px}
.slbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--mt);text-transform:uppercase}
.div{height:1px;background:var(--bd);flex-shrink:0}

/* Inputs */
.inp-w{position:relative}
.inp-w .material-icons-round{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--mt);pointer-events:none}
.inp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 9px 9px 30px;color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ag)}
.inp::placeholder{color:var(--mt)}
.browse{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--mt);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.browse:hover{border-color:var(--ac);color:var(--ac);background:var(--ag)}
.browse .material-icons-round{font-size:13px}

/* Sliders */
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.sl{font-size:12px;color:var(--tx)}
.sv{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ac);background:var(--ag);padding:2px 6px;border-radius:5px;min-width:38px;text-align:center}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--bd);border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--ac);border-radius:50%;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3)}

/* Color boxes */
.cr2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cb{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px;cursor:pointer;transition:border-color .15s}
.cb:hover{border-color:var(--ac)}
.cb-l{font-size:9px;color:var(--mt);margin-bottom:4px}
.cb-p{display:flex;align-items:center;gap:5px}
.cs{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,.1);flex-shrink:0}
.ch{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx)}

/* Tabs */
.tabs{display:flex;background:var(--s2);border-radius:8px;padding:3px;gap:2px}
.tab{flex:1;padding:5px;text-align:center;font-size:10px;color:var(--mt);cursor:pointer;border-radius:6px;transition:all .15s;font-family:'DM Sans',sans-serif;border:none;background:none}
.tab.on{background:var(--s3);color:var(--tx);font-weight:500}

/* Radius buttons */
.rg{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.rb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;cursor:pointer;font-size:9px;color:var(--mt);transition:all .15s}
.rb .rbox{width:14px;height:14px;background:var(--mt);opacity:.35}
.rb:hover,.rb.on{border-color:var(--ac);color:var(--ac)}
.rb.on .rbox{opacity:1;background:var(--ac)}

/* Gradient swatches */
.gg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.gs{height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.gs:hover,.gs.on{border-color:#fff;transform:scale(1.06)}

/* Toggles */
.trow{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r)}
.trow-l{font-size:11px;color:var(--tx)}
.tog{width:30px;height:17px;background:var(--bd);border-radius:20px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--ac)}
.tog::after{content:'';position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.tog.on::after{transform:translateX(13px)}

/* Grid of small buttons */
.btng{display:flex;flex-wrap:wrap;gap:4px}
.bts{padding:5px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;font-size:10px;color:var(--mt);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:3px;transition:all .15s}
.bts:hover{border-color:var(--ac);color:var(--ac)}
.bts .material-icons-round{font-size:12px}
.bts.danger:hover{border-color:#e8403a;color:#e8403a}

/* Blend mode select */
.bsel{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:7px 9px;color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;appearance:none;cursor:pointer}
.bsel:focus{border-color:var(--ac)}

/* Export buttons */
.eg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.btn{padding:9px 4px;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .15s}
.btn .material-icons-round{font-size:12px}
.bp{background:var(--ac);color:#fff}
.bp:hover{background:#c84a1a;transform:translateY(-1px);box-shadow:0 4px 16px var(--ag)}
.bp:active{transform:none}
.bp.ld{opacity:.6;pointer-events:none}
.bs{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.bs:hover{border-color:var(--ac);color:var(--ac)}

/* Preset layouts */
.prlg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.prl{padding:8px 4px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.prl:hover{border-color:var(--ai);background:var(--aig)}
.prl-icon{font-size:9px;color:var(--mt);font-family:'IBM Plex Mono',monospace;text-align:center;line-height:1.3}

/* AI */
.ai-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--ai);text-transform:uppercase;display:flex;align-items:center;gap:5px}
.ai-lbl::before{content:'✦';font-size:9px}
.ai-inp{width:100%;background:var(--s2);border:1px solid rgba(124,106,247,.3);border-radius:var(--r);padding:8px 10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;resize:none;transition:border-color .2s;min-height:56px}
.ai-inp:focus{border-color:var(--ai);box-shadow:0 0 0 3px var(--aig)}
.ai-inp::placeholder{color:var(--mt)}
.ai-btn{width:100%;padding:9px;border-radius:var(--r);background:linear-gradient(135deg,var(--ai),#a855f7);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.ai-btn:hover{opacity:.85;transform:translateY(-1px)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ai-btn .material-icons-round{font-size:14px}
.ai-res{position:relative;background:var(--s2);border:1px solid rgba(124,106,247,.25);border-radius:var(--r);overflow:hidden;aspect-ratio:1;display:none;align-items:center;justify-content:center}
.ai-res.vis{display:flex}
.ai-ld{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--mt)}
.ai-sp{width:28px;height:28px;border:2px solid var(--bd);border-top:2px solid var(--ai);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ai-lt{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--ai)}
.ai-res img{width:100%;height:100%;object-fit:cover;display:none}
.ai-res img.ld{display:block}
.ai-use{position:absolute;bottom:7px;right:7px;padding:4px 9px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;font-size:10px;color:var(--tx);cursor:pointer;font-family:'DM Sans',sans-serif;display:none;align-items:center;gap:3px;transition:all .15s}
.ai-use:hover{border-color:var(--ai);color:var(--ai)}
.ai-use.show{display:flex}
.ai-gal{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.ai-gi{aspect-ratio:1;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--bd);transition:all .15s}
.ai-gi:hover{border-color:var(--ai);transform:scale(1.05)}
.ai-gi img{width:100%;height:100%;object-fit:cover}

/* Modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mov.open{opacity:1;pointer-events:all}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:20px 20px 0 0;width:100%;max-width:960px;height:90dvh;display:flex;flex-direction:column;transform:translateY(40px);transition:transform .3s cubic-bezier(.34,1.2,.64,1);overflow:hidden}
.mov.open .modal{transform:translateY(0)}
.mhdr{padding:12px 16px 8px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.mtr{display:flex;align-items:center;justify-content:space-between}
.mtit{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.mcnt{font-size:10px;color:var(--mt);font-family:'IBM Plex Mono',monospace}
.mcl{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--bd);border-radius:7px;cursor:pointer;color:var(--mt)}
.mcl .material-icons-round{font-size:14px}
.msw{position:relative}
.msw .material-icons-round{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--mt);pointer-events:none}
.ms{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 8px 8px 30px;color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
.ms:focus{border-color:var(--ac)}
.ms::placeholder{color:var(--mt)}
.msr{display:flex;gap:3px;overflow-x:auto;padding:0}
.msr::-webkit-scrollbar{display:none}
.mst{padding:4px 9px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--mt);border:1px solid var(--bd);border-radius:20px;cursor:pointer;transition:all .15s;background:none;white-space:nowrap;flex-shrink:0}
.mst.on{background:var(--ac);border-color:var(--ac);color:#fff}
.cscr{display:flex;gap:3px;overflow-x:auto;padding:6px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.cscr::-webkit-scrollbar{display:none}
.ctab{padding:3px 10px;font-size:10px;color:var(--mt);border:1px solid var(--bd);border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;flex-shrink:0}
.ctab:hover{border-color:var(--ac);color:var(--ac)}
.ctab.on{background:var(--s2);border-color:var(--bd);color:var(--tx);font-weight:500}
.igw{flex:1;overflow-y:auto;padding:10px 16px}
.igw::-webkit-scrollbar{width:4px}
.igw::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.gst{font-size:9px;color:var(--mt);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.1em;margin:10px 0 5px}
.gst:first-child{margin-top:0}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:4px}
.it{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 3px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .15s}
.it:hover,.it.sel{border-color:var(--ac);background:var(--ag)}
.it .material-icons-round,.it .material-symbols-rounded{font-size:20px;color:var(--tx)}
.it i.ph{font-size:20px;color:var(--tx)}
.itn{font-size:7px;color:var(--mt);font-family:'IBM Plex Mono',monospace;text-align:center;word-break:break-all;line-height:1.2}

/* Color picker */
.cpov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.cpov.open{opacity:1;pointer-events:all}
.cpick{background:var(--sf);border:1px solid var(--bd);border-radius:20px 20px 0 0;width:100%;max-width:400px;padding:16px 16px 28px;display:flex;flex-direction:column;gap:10px;transform:translateY(30px);transition:transform .25s cubic-bezier(.34,1.2,.64,1)}
.cpov.open .cpick{transform:translateY(0)}
.cp-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;text-align:center}
.cp-sl{position:relative;width:100%;height:150px;border-radius:9px;cursor:crosshair;overflow:hidden;flex-shrink:0}
.cp-slbg{position:absolute;inset:0}
.cp-slw{position:absolute;inset:0;background:linear-gradient(to right,#fff,transparent)}
.cp-slk{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,#000)}
.cp-th{position:absolute;width:15px;height:15px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4),0 2px 5px rgba(0,0,0,.4);transform:translate(-50%,-50%);pointer-events:none}
.cp-hue{width:100%;height:13px;border-radius:7px;cursor:pointer;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);position:relative;flex-shrink:0}
.cp-hth{position:absolute;width:17px;height:17px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4);top:50%;transform:translate(-50%,-50%);pointer-events:none}
.cp-bot{display:flex;align-items:center;gap:9px}
.cp-prev{width:40px;height:40px;border-radius:9px;flex-shrink:0;border:1px solid var(--bd)}
.cp-hex{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--tx);outline:none;text-transform:uppercase;letter-spacing:.05em;transition:border-color .15s}
.cp-hex:focus{border-color:var(--ac)}
.cp-sw-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}
.cp-sw{height:20px;border-radius:4px;cursor:pointer;border:1px solid rgba(255,255,255,.08);transition:transform .1s}
.cp-sw:hover{transform:scale(1.18)}
.cp-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.cp-cancel{padding:9px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--mt);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.cp-ok{padding:9px;background:var(--ac);border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--tx);color:var(--bg);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:6px 14px;border-radius:20px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--ac);color:#fff}
.toast.ai{background:var(--ai);color:#fff}

/* custom gradient builder */

  .ws{grid-template-columns:1fr;overflow:visible;height:auto}
  .pv{min-height:260px;height:auto;padding:20px 14px}

}

<body>
<header>
  <div class="brand">Rei<span>Icons</span></div>
  <div class="src-tabs" id="hSrc">
    <button class="st on" data-src="mr">Mat. Round</button>
    <button class="st" data-src="ms">Mat. Symbols</button>
    <button class="st" data-src="ph">Phosphor</button>
    <button class="st" data-src="ify">✦ Iconify</button>
  </div>
</header>

<div class="ws">
  <!-- PREVIEW -->
  <div class="pv">
    <div id="cvs">
      <div id="cvsBg">
        <div class="snap-h" id="snapH"></div>
        <div class="snap-v" id="snapV"></div>
      </div>
    </div>
    <div class="info">
      <div class="ic"><div class="ic-l">Слоёв</div><div class="ic-v" id="iLayers">1</div></div>
      <div class="ic"><div class="ic-l">Иконка</div><div class="ic-v" id="iName">auto_awesome</div></div>
      <div class="ic"><div class="ic-l">Источник</div><div class="ic-v" id="iSrc">Mat. Round</div></div>
      <div class="ic"><div class="ic-l">Канвас</div><div class="ic-v" id="iCv">112×112</div></div>
    </div>
  </div>

  <!-- PANEL -->
  <div class="panel">
    <div class="panel-body" id="panelBody">
      <!-- Dynamically: layer controls OR canvas controls based on selection -->
    </div>

    <!-- Layer strip -->
    <div class="layer-strip">
      <div class="layer-strip-hdr">
        <div class="layer-strip-title">Слои</div>
        <div class="layer-actions">
          <div class="la" title="Добавить слой" onclick="addLayer()"><span class="material-icons-round">add</span></div>
          <div class="la" title="Дублировать" onclick="dupLayer()"><span class="material-icons-round">content_copy</span></div>
          <div class="la" title="Вверх" onclick="moveLayerUp()"><span class="material-icons-round">arrow_upward</span></div>
          <div class="la" title="Вниз" onclick="moveLayerDown()"><span class="material-icons-round">arrow_downward</span></div>
          <div class="la danger" title="Удалить" onclick="delLayer()" style="color:var(--mt)"><span class="material-icons-round">delete</span></div>
        </div>
      </div>
      <div class="layer-list" id="layerList"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mov" id="mOv" onclick="if(event.target===this)closeBrowser()">
  <div class="modal">
    <div class="mhdr">
      <div class="mtr">
        <div><div class="mtit">Выбор иконки</div><div class="mcnt" id="mCnt"></div></div>
        <div class="mcl" onclick="closeBrowser()"><span class="material-icons-round">close</span></div>
      </div>
      <div class="msw"><span class="material-icons-round">search</span><input class="ms" id="mSrch" placeholder="Поиск иконок…" autocomplete="off"></div>
      <div class="msr" id="mSrc">
        <button class="mst on" data-src="mr">Material Round</button>
        <button class="mst" data-src="ms">Material Symbols</button>
        <button class="mst" data-src="ph">Phosphor</button>
        <button class="mst" data-src="ify">✦ Iconify (275k)</button>
      </div>
    </div>
    <div class="cscr" id="cats"></div>
    <div class="igw" id="igw"></div>
  </div>
</div>

<!-- Color picker -->
<div class="cpov" id="cpOv" onclick="if(event.target===this)closePicker()">
  <div class="cpick">
    <div class="cp-title" id="cpTitle">Цвет</div>
    <div class="cp-sl" id="cpSL">
      <div class="cp-slbg" id="cpSlBg"></div>
      <div class="cp-slw"></div>
      <div class="cp-slk"></div>
      <div class="cp-th" id="cpTh"></div>
    </div>
    <div style="position:relative">
      <div class="cp-hue" id="cpHue"><div class="cp-hth" id="cpHth"></div></div>
    </div>
    <div class="cp-bot">
      <div class="cp-prev" id="cpPrev"></div>
      <input class="cp-hex" id="cpHex" maxlength="7" spellcheck="false">
    </div>
    <div class="cp-sw-grid" id="cpSws"></div>
    <div class="cp-btns">
      <button class="cp-cancel" onclick="closePicker()">Отмена</button>
      <button class="cp-ok" onclick="confirmPicker()">Применить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
// ─── ICON DATA ───────────────────────────────────────────────────────────────
// ─── STATE ────────────────────────────────────────────────────────────────────
var BG = {
  type:'solid', color:'#e05c2a',
  grad:'linear-gradient(135deg,#e05c2a,#f0a06e)',
  radius:'22%', shadow:true, border:false
};
var cvSize = 112; // canvas px size
var layers = [];
var selId = null;
var lid = 0;

function mkLayer(opts) {
  lid++;
  return Object.assign({
    id:'l'+lid, src:'mr', icon:'auto_awesome', aiUrl:null,
    x:50, y:50, size:56, rot:0, opacity:100, color:'#ffffff',
    blend:'normal', flipX:false, visible:true, locked:false
  }, opts||{});
}
function selLayer() { return layers.find(function(l){return l.id===selId;})||null; }
function selIdx() { return layers.findIndex(function(l){return l.id===selId;}); }

// ─── CANVAS RENDER ───────────────────────────────────────────────────────────
function renderCanvas() {
  var bg = document.getElementById('cvsBg');
  bg.style.width = cvSize+'px';
  bg.style.height = cvSize+'px';
  bg.style.borderRadius = BG.radius;
  bg.style.boxShadow = BG.shadow ? '0 16px 48px rgba(0,0,0,.45),0 4px 16px rgba(0,0,0,.25)' : 'none';
  bg.style.outline = BG.border ? '1.5px solid rgba(255,255,255,.2)' : 'none';
  bg.style.outlineOffset = '-1.5px';
  bg.style.overflow = 'hidden';
  bg.style.position = 'relative';
  if (BG.type==='solid') bg.style.background = BG.color;
  else if (BG.type==='gradient') bg.style.background = BG.grad;
  else bg.style.background = 'rgba(255,255,255,.05)';

  // Remove old layer-el elements, keep snap lines
  Array.from(bg.children).forEach(function(c){ if(c.classList.contains('layer-el')) bg.removeChild(c); });

  layers.forEach(function(layer) {
    if (!layer.visible) return;
    var el = document.createElement('div');
    el.className = 'layer-el' + (layer.id===selId?' sel':'');
    el.dataset.id = layer.id;
    var tx = -50, ty = -50;
    var xf = 'translate('+tx+'%,'+ty+'%) rotate('+layer.rot+'deg)'+(layer.flipX?' scaleX(-1)':'');
    el.style.cssText = [
      'left:'+layer.x+'%',
      'top:'+layer.y+'%',
      'width:'+layer.size+'px',
      'height:'+layer.size+'px',
      'opacity:'+(layer.opacity/100),
      'mix-blend-mode:'+layer.blend,
      'transform:'+xf,
      'position:absolute',
      'cursor:'+(layer.locked?'default':'grab'),
      'outline:'+(layer.id===selId?'1.5px solid rgba(255,255,255,.6)':'1.5px solid transparent'),
      'outline-offset:2px',
      'display:flex',
      'align-items:center',
      'justify-content:center',
      'touch-action:none',
      'z-index:'+(layers.indexOf(layer)+1)
    ].join(';');

    renderLayerContent(el, layer);
    bg.appendChild(el);
    setupDrag(el, layer);
  });

  renderLayerStrip();
  updateInfoBar();
}
function render() {
  renderCanvas();
  renderPanel();
}
function updateInfoBar() {
  var sl = selLayer();
  var srcLbl = {mr:'Mat. Round', ms:'Mat. Symbols', ph:'Phosphor', ify:'Iconify', ai:'AI'};
  document.getElementById('iLayers').textContent = layers.length;
  document.getElementById('iName').textContent = sl?(sl.aiUrl?'AI-иконка':sl.icon):'—';
  document.getElementById('iSrc').textContent = sl?srcLbl[sl.src]:'—';
  document.getElementById('iCv').textContent = cvSize+'×'+cvSize;
}

function renderLayerContent(el, layer) {
  if (layer.aiUrl) {
    var cvs = document.createElement('canvas');
    cvs.width = layer.size; cvs.height = layer.size;
    cvs.style.cssText = 'display:block;';
    el.appendChild(cvs);
    colorizeImg(cvs, layer.aiUrl, layer.color, layer.size);
    return;
  }
  if (layer.src==='ify') {
    var parts = layer.icon.split(':');
    if (parts.length===2) {
      var img = document.createElement('img');
      img.style.cssText = 'width:'+layer.size+'px;height:'+layer.size+'px;display:block;pointer-events:none;';
      img.src = 'https://api.iconify.design/'+parts[0]+'/'+parts[1]+'.svg?color='+layer.color.replace('#','%23')+'&width='+layer.size+'&height='+layer.size;
      el.appendChild(img);
    }
    return;
  }
  if (layer.src==='mr') {
    var s = document.createElement('span');
    s.className='material-icons-round';
    s.textContent=layer.icon;
    s.style.cssText='font-size:'+layer.size+'px;color:'+layer.color+';line-height:1;pointer-events:none;';
    el.appendChild(s); return;
  }
  if (layer.src==='ms') {
    var s = document.createElement('span');
    s.className='material-symbols-rounded';
    s.textContent=layer.icon;
    s.style.cssText='font-size:'+layer.size+'px;color:'+layer.color+';line-height:1;pointer-events:none;font-family:"Material Symbols Rounded";font-feature-settings:"liga";font-variation-settings:"FILL" 0,"wght" 400,"GRAD" 0,"opsz" 48;text-transform:none;letter-spacing:normal;word-wrap:normal;';
    el.appendChild(s); return;
  }
  if (layer.src==='ph') {
    var i = document.createElement('i');
    i.className='ph ph-'+layer.icon;
    i.style.cssText='font-size:'+layer.size+'px;color:'+layer.color+';line-height:1;pointer-events:none;';
    el.appendChild(i); return;
  }
}

// ─── DRAG ────────────────────────────────────────────────────────────────────
var drag = null;
function setupDrag(el, layer) {
  function start(e) {
    if (layer.locked) return;
    selId = layer.id;
    render();
    var pt = e.touches ? e.touches[0] : e;
    drag = { id:layer.id, startX:pt.clientX, startY:pt.clientY, ox:layer.x, oy:layer.y };
    e.stopPropagation();
    if (!e.touches) e.preventDefault();
  }
  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', start, {passive:true});
}
document.addEventListener('mousemove', onDragMove);
document.addEventListener('touchmove', onDragMove, {passive:true});
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

function onDragMove(e) {
  if (!drag) return;
  if (pinch) return; // pinch takes priority
  var layer = layers.find(function(l){return l.id===drag.id;});
  if (!layer) return;
  var pt = e.touches ? e.touches[0] : e;
  var dx = pt.clientX - drag.startX;
  var dy = pt.clientY - drag.startY;
  var nx = drag.ox + (dx/cvSize)*100;
  var ny = drag.oy + (dy/cvSize)*100;
  // Snap to center (50%)
  var snapX = Math.abs(nx-50)<4, snapY = Math.abs(ny-50)<4;
  layer.x = snapX ? 50 : Math.max(0,Math.min(100,nx));
  layer.y = snapY ? 50 : Math.max(0,Math.min(100,ny));
  document.getElementById('snapH').style.opacity = snapY ? '1':'0';
  document.getElementById('snapV').style.opacity = snapX ? '1':'0';
  renderCanvas();
}
function endDrag() {
  drag=null;
  document.getElementById('snapH').style.opacity='0';
  document.getElementById('snapV').style.opacity='0';
}

// Click canvas bg to deselect
document.getElementById('cvsBg').addEventListener('click', function(e){
  if (e.target===this){selId=null;render();}
});

// ─── PINCH TO SCALE + TWO-FINGER MOVE ────────────────────────────────────────
var pinch = null;
document.getElementById('cvsBg').addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    var sl = selLayer();
    var t0 = e.touches[0], t1 = e.touches[1];
    var dist = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
    var cx = (t0.clientX+t1.clientX)/2, cy = (t0.clientY+t1.clientY)/2;
    pinch = { dist:dist, size:sl?sl.size:64, cx:cx, cy:cy, ox:sl?sl.x:50, oy:sl?sl.y:50 };
  }
}, {passive:false});

document.getElementById('cvsBg').addEventListener('touchmove', function(e) {
  if (pinch && e.touches.length === 2) {
    e.preventDefault();
    var sl = selLayer(); if(!sl) return;
    var t0=e.touches[0], t1=e.touches[1];
    var dist = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
    // Scale
    var scale = dist / pinch.dist;
    sl.size = Math.max(12, Math.min(200, Math.round(pinch.size * scale)));
    // Two-finger pan: move by midpoint delta
    var cx=(t0.clientX+t1.clientX)/2, cy=(t0.clientY+t1.clientY)/2;
    var bg = document.getElementById('cvsBg');
    var rect = bg.getBoundingClientRect();
    sl.x = Math.max(0,Math.min(100, pinch.ox + (cx-pinch.cx)/rect.width*100));
    sl.y = Math.max(0,Math.min(100, pinch.oy + (cy-pinch.cy)/rect.height*100));
    renderCanvas();
    // Update slider displays if visible
    var rs=document.getElementById('r_sz'); if(rs){rs.value=sl.size;var sv=document.getElementById('sv_sz');if(sv)sv.textContent=sl.size+'px';}
    var rpx=document.getElementById('r_px'); if(rpx){rpx.value=Math.round(sl.x);var sv2=document.getElementById('sv_px');if(sv2)sv2.textContent=Math.round(sl.x)+'%';}
    var rpy=document.getElementById('r_py'); if(rpy){rpy.value=Math.round(sl.y);var sv3=document.getElementById('sv_py');if(sv3)sv3.textContent=Math.round(sl.y)+'%';}
  }
}, {passive:false});

document.getElementById('cvsBg').addEventListener('touchend', function(e) {
  if (e.touches.length < 2) pinch = null;
});

// ─── LAYER STRIP ─────────────────────────────────────────────────────────────
function renderLayerStrip() {
  var list = document.getElementById('layerList');
  list.innerHTML = layers.map(function(l,i){
    var icon='';
    if(l.src==='mr') icon='<span class="material-icons-round" style="font-size:18px;color:'+l.color+'">'+l.icon+'</span>';
    else if(l.src==='ms') icon='<span class="material-symbols-rounded" style="font-size:18px;color:'+l.color+'">'+l.icon+'</span>';
    else if(l.src==='ph') icon='<i class="ph ph-'+l.icon+'" style="font-size:18px;color:'+l.color+'"></i>';
    else if(l.src==='ify'){var pts=l.icon.split(':');icon=pts.length===2?'<img src="https://api.iconify.design/'+pts[0]+'/'+pts[1]+'.svg?color='+l.color.replace('#','%23')+'&width=18&height=18" width="18" height="18" style="display:block">':'';}
    else icon='<span class="material-icons-round" style="font-size:18px;color:'+l.color+'">auto_awesome</span>';
    return '<div class="lcard'+(l.id===selId?' sel':'')+'" onclick="selectLayer(\''+l.id+'\')" title="'+(l.aiUrl?'AI':l.icon)+'">'
      +'<div class="lcard-icon">'+icon+'</div>'
      +'<div class="lcard-name">'+(l.aiUrl?'AI':l.icon.split(':').pop())+'</div>'
      +(l.locked?'<span class="material-icons-round lcard-vis" style="color:var(--ac)">lock</span>':!l.visible?'<span class="material-icons-round lcard-vis">visibility_off</span>':'')
      +'</div>';
  }).join('');
}
function selectLayer(id) { selId=id; render(); }

// ─── PANEL ───────────────────────────────────────────────────────────────────
function renderPanel() {
  var sl = selLayer();
  var pb = document.getElementById('panelBody');
  pb.innerHTML = '';
  if (sl) renderLayerPanel(pb, sl);
  else renderCanvasPanel(pb);
}

function h(tag, attrs, inner) {
  var el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(function(e){ el.setAttribute(e[0],e[1]); });
  if (inner !== undefined) el.innerHTML = inner;
  return el;
}
function div(cls, inner) { return h('div',{class:cls},inner); }

function renderLayerPanel(pb, sl) {
  // Icon section
  var sec = div('sec');
  sec.appendChild(div('slbl','Иконка слоя'));
  var inpW = div('inp-w');
  inpW.innerHTML='<span class="material-icons-round">tag</span>';
  var inp = h('input',{class:'inp',id:'iconInp',value:sl.icon,placeholder:'home, star…',autocomplete:'off'});
  inp.addEventListener('input', function(e){
    var v=e.target.value.trim().toLowerCase().replace(/\s+/g,sl.src==='ph'?'-':'_');
    if(v){sl.icon=v;render();}
  });
  inpW.appendChild(inp);
  sec.appendChild(inpW);
  var browseBtn = h('button',{class:'browse',onclick:'openBrowser()'},'<span class="material-icons-round">apps</span>Просмотреть иконки');
  sec.appendChild(browseBtn);
  if(sl.aiUrl){
    var clrBtn = h('button',{class:'browse',style:'border-color:var(--ai);color:var(--ai)',onclick:'clearAiLayer()'},'<span class="material-icons-round">auto_awesome</span>Убрать AI-иконку');
    sec.appendChild(clrBtn);
  }
  pb.appendChild(sec);
  pb.appendChild(div('div'));

  // Size & Position
  var sec2 = div('sec');
  sec2.appendChild(div('slbl','Размер и позиция'));
  sec2.appendChild(makeSlider('Размер','sz',sl.size,16,128,2,function(v){sl.size=v;renderCanvas();},'px'));
  sec2.appendChild(makeSlider('X','px',sl.x,0,100,1,function(v){sl.x=v;renderCanvas();},'%'));
  sec2.appendChild(makeSlider('Y','py',sl.y,0,100,1,function(v){sl.y=v;renderCanvas();},'%'));
  pb.appendChild(sec2);
  pb.appendChild(div('div'));

  // Transform
  var sec3 = div('sec');
  sec3.appendChild(div('slbl','Трансформ'));
  sec3.appendChild(makeSlider('Поворот','rot',sl.rot,0,360,1,function(v){sl.rot=v;renderCanvas();},'°'));
  sec3.appendChild(makeSlider('Прозрачность','op',sl.opacity,0,100,1,function(v){sl.opacity=v;renderCanvas();},'%'));
  // Blend mode
  var br = div('sr'); br.innerHTML='<span class="sl">Режим наложения</span>';
  var sel = h('select',{class:'bsel'});
  ['normal','multiply','screen','overlay','soft-light','color-dodge','difference'].forEach(function(bm){
    var opt=document.createElement('option');
    opt.value=bm; opt.textContent=bm; opt.selected=sl.blend===bm;
    sel.appendChild(opt);
  });
  sel.addEventListener('change',function(){sl.blend=sel.value;render();});
  sec3.appendChild(br); sec3.appendChild(sel);
  // Buttons row
  var btng = div('btng');
  var flipBtn=h('button',{class:'bts',onclick:'flipLayer()'},'<span class="material-icons-round">flip</span>Отразить');
  var lockBtn=h('button',{class:'bts',onclick:'toggleLock()'},'<span class="material-icons-round">'+(sl.locked?'lock_open':'lock')+'</span>'+(sl.locked?'Разблок.':'Блок.'));
  var visBtn=h('button',{class:'bts',onclick:'toggleVis()'},'<span class="material-icons-round">'+(sl.visible?'visibility_off':'visibility')+'</span>'+(sl.visible?'Скрыть':'Показать'));
  btng.appendChild(flipBtn); btng.appendChild(lockBtn); btng.appendChild(visBtn);
  sec3.appendChild(btng);
  pb.appendChild(sec3);
  pb.appendChild(div('div'));

  // Color
  var sec4 = div('sec');
  sec4.appendChild(div('slbl','Цвет иконки'));
  var cb = div('cb');
  cb.setAttribute('onclick','openPicker("ic")');
  cb.innerHTML='<div class="cb-l">Цвет иконки</div><div class="cb-p"><div class="cs" id="icSw" style="background:'+sl.color+'"></div><span class="ch" id="icHx">'+sl.color+'</span></div>';
  sec4.appendChild(cb);
  pb.appendChild(sec4);
  pb.appendChild(div('div'));

  // AI section
  renderAiSection(pb);
  pb.appendChild(div('div'));

  // Export
  renderExportSection(pb);
}

function renderCanvasPanel(pb) {
  // Canvas size
  var sec0 = div('sec');
  sec0.appendChild(div('slbl','Канвас'));
  sec0.appendChild(makeSlider('Размер канваса','cvSz',cvSize,64,256,8,function(v){cvSize=v;renderCanvas();},'px'));
  pb.appendChild(sec0);
  pb.appendChild(div('div'));

  // Background
  var secBg = div('sec');
  secBg.appendChild(div('slbl','Фон'));
  var bgTabs = div('tabs');
  ['solid','gradient','none'].forEach(function(t){
    var b=h('button',{class:'tab'+(BG.type===t?' on':''),onclick:'setBgType("'+t+'")'},{solid:'Цвет',gradient:'Градиент',none:'Без фона'}[t]);
    bgTabs.appendChild(b);
  });
  secBg.appendChild(bgTabs);
  if (BG.type==='solid') {
    var cr=div('cr2');
    var cb1=div('cb'); cb1.setAttribute('onclick','openPicker("bg")');
    cb1.innerHTML='<div class="cb-l">Фон</div><div class="cb-p"><div class="cs" id="bgSw" style="background:'+BG.color+'"></div><span class="ch" id="bgHx">'+BG.color+'</span></div>';
    var cb2=div('cb'); cb2.setAttribute('onclick','openPicker("ic")');
    cb2.innerHTML='<div class="cb-l">Все иконки</div><div class="cb-p"><div class="cs" style="background:'+((selLayer()||{}).color||'#fff')+'"></div><span class="ch">все</span></div>';
    cr.appendChild(cb1); cr.appendChild(cb2);
    secBg.appendChild(cr);
  }
  if (BG.type==='gradient') {
    var gg=div('gg');
    var grads=['linear-gradient(135deg,#e05c2a,#f0a06e)','linear-gradient(135deg,#2a6fc8,#6eadf0)','linear-gradient(135deg,#7c6af7,#f06e6e)','linear-gradient(135deg,#0f0f12,#2a2a35)','linear-gradient(135deg,#4ade9a,#2196f3)','linear-gradient(135deg,#ff6eb4,#ff9f4a)','linear-gradient(135deg,#00c9ff,#92fe9d)','linear-gradient(135deg,#fc4a1a,#f7b733)','linear-gradient(135deg,#a8edea,#fed6e3)','linear-gradient(135deg,#1a1a2e,#4f4f7f)'];
    grads.forEach(function(g){
      var s=h('div',{class:'gs'+(BG.grad===g?' on':''),style:'background:'+g,onclick:'setBgGrad("'+g+'")'});
      gg.appendChild(s);
    });
    secBg.appendChild(gg);
    // Custom gradient
    var cgWrap=div('sec');
    cgWrap.style.cssText='background:var(--s3);border:1px solid var(--bd);border-radius:var(--r);padding:9px;gap:7px;margin-top:6px';

function addLayer() {
  var src = (selLayer()||{src:'mr'}).src;
  var icon = src==='ph'?'house':src==='ify'?'mdi:home':'home';
  var l=mkLayer({src:src,icon:icon,x:50,y:50,size:48,color:'#ffffff'});
  layers.push(l); selId=l.id; render();
}
function delLayer() {
  if (!selId||layers.length<1) return;
  layers=layers.filter(function(l){return l.id!==selId;});
  selId=layers.length?layers[layers.length-1].id:null;
  render();
}
function dupLayer() {
  var sl=selLayer(); if(!sl) return;
  var nl=Object.assign({},sl,{id:'l'+(++lid),x:sl.x+5,y:sl.y+5});
  layers.push(nl); selId=nl.id; render();
}
function moveLayerUp() {
  var i=selIdx(); if(i<layers.length-1){var t=layers[i];layers[i]=layers[i+1];layers[i+1]=t;render();}
}
function moveLayerDown() {
  var i=selIdx(); if(i>0){var t=layers[i];layers[i]=layers[i-1];layers[i-1]=t;render();}
}
function flipLayer() {
  var sl=selLayer(); if(sl){sl.flipX=!sl.flipX;render();}
}
function toggleLock() {
  var sl=selLayer(); if(sl){sl.locked=!sl.locked;render();}
}
function toggleVis() {
  var sl=selLayer(); if(sl){sl.visible=!sl.visible;render();}
}

var _ifyDeb;
function buildGrid(){
  var wrap=document.getElementById('igw');
  var ms=getModalSrc();
  var sl=selLayer();
  var curIcon=sl?sl.icon:'';

  if(ms==='ify'){
    var q=bQ.trim();
    if(!q){wrap.innerHTML='<div style="color:var(--mt);font-size:12px;padding:20px;text-align:center;line-height:1.8">Введи запрос для поиска<br><span style="font-size:10px;opacity:.6">mdi · lucide · tabler · heroicons · carbon · fluent · и 200+ наборов</span></div>';return;}
    wrap.innerHTML='<div style="color:var(--mt);font-size:11px;padding:16px;text-align:center">Ищем…</div>';
    clearTimeout(_ifyDeb);
    _ifyDeb=setTimeout(function(){
      fetch('https://api.iconify.design/search?query='+encodeURIComponent(q)+'&limit=96')
        .then(function(r){return r.json();})
        .then(function(data){
          var icons=data.icons||[];
          document.getElementById('mCnt').textContent='Найдено: '+(data.total||icons.length);
          if(!icons.length){wrap.innerHTML='<div style="color:var(--mt);font-size:12px;padding:20px;text-align:center">Ничего не найдено</div>';return;}
          wrap.innerHTML='<div class="ig">'+icons.map(function(ic){return '<div class="it'+(ic===curIcon?' sel':'')+'" data-icon="'+ic+'" title="'+ic+'">'+iHTML(ic,'ify')+'<div class="itn">'+ic.split(':')[1]+'</div></div>';}).join('')+'</div>';
          attachIconClicks(wrap, 'ify');
        }).catch(function(){wrap.innerHTML='<div style="color:var(--mt);font-size:12px;padding:20px;text-align:center">Ошибка соединения</div>';});
    },300);
    return;
  }

  var q=bQ.toLowerCase();
  var data=getData();
  var html='';
  if(q){
    var res=[],seen={};
    Object.values(data).forEach(function(a){a.forEach(function(ic){if(ic.includes(q)&&!seen[ic]){seen[ic]=1;res.push(ic);}});});
    document.getElementById('mCnt').textContent='Найдено: '+res.length;
    html='<div class="ig">'+res.map(function(ic){return '<div class="it'+(ic===curIcon?' sel':'')+'" data-icon="'+ic+'" title="'+ic+'">'+iHTML(ic,ms)+'<div class="itn">'+ic+'</div></div>';}).join('')+'</div>';
  } else if(bCat==='ВСЕ'){
    Object.entries(data).forEach(function(e){html+='<div class="gst">'+e[0]+'</div><div class="ig">'+e[1].map(function(ic){return '<div class="it'+(ic===curIcon?' sel':'')+'" data-icon="'+ic+'" title="'+ic+'">'+iHTML(ic,ms)+'<div class="itn">'+ic+'</div></div>';}).join('')+'</div>';});
  } else {
    var icons=data[bCat]||[];
    html='<div class="ig">'+icons.map(function(ic){return '<div class="it'+(ic===curIcon?' sel':'')+'" data-icon="'+ic+'" title="'+ic+'">'+iHTML(ic,ms)+'<div class="itn">'+ic+'</div></div>';}).join('')+'</div>';
  }
  wrap.innerHTML=html;
  attachIconClicks(wrap, ms);
}

function attachIconClicks(wrap, src) {
  wrap.querySelectorAll('.it').forEach(function(tile){
    tile.addEventListener('click',function(){
      var sl=selLayer();
      if(!sl){sl=mkLayer({src:src});layers.push(sl);selId=sl.id;}
      sl.icon=tile.dataset.icon;
      sl.src=src;
      if(src==='ify'){sl.icon=tile.dataset.icon;}

      render();
      wrap.querySelectorAll('.it').forEach(function(t){t.classList.remove('sel');});
      tile.classList.add('sel');
      setTimeout(closeBrowser,150);
    });
  });
}

function genAI(){

  var btn=document.getElementById('aiBtn'),res=document.getElementById('aiRes'),ld=document.getElementById('aiLd'),lt=document.getElementById('aiLt'),img=document.getElementById('aiImg'),use=document.getElementById('aiUse');

// ─── COLORIZER ───────────────────────────────────────────────────────────────
var _cc={};
function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];return{r:parseInt(hex.slice(0,2),16),g:parseInt(hex.slice(2,4),16),b:parseInt(hex.slice(4,6),16)};}
function colorizeImg(canvas,url,color,size){
  var key=url+'|'+color+'|'+size,ctx=canvas.getContext('2d');
  if(_cc[key]){var c=new Image();c.onload=function(){ctx.clearRect(0,0,size,size);ctx.drawImage(c,0,0,size,size);};c.src=_cc[key];return;}
  var col=hexToRgb(color),tmp=new Image();tmp.crossOrigin='anonymous';
  tmp.onload=function(){
    var off=document.createElement('canvas');off.width=size;off.height=size;
    var octx=off.getContext('2d');octx.drawImage(tmp,0,0,size,size);
    try{var id=octx.getImageData(0,0,size,size),d=id.data;
      for(var i=0;i<d.length;i+=4){var lum=d[i]*.299+d[i+1]*.587+d[i+2]*.114,a=Math.round((1-lum/255)*255*(d[i+3]/255));d[i]=col.r;d[i+1]=col.g;d[i+2]=col.b;d[i+3]=a;}
      octx.putImageData(id,0,0);var du=off.toDataURL();_cc[key]=du;ctx.clearRect(0,0,size,size);ctx.drawImage(off,0,0,size,size);
    }catch(e){ctx.drawImage(tmp,0,0,size,size);}
  };tmp.onerror=function(){ctx.fillStyle=color;ctx.fillRect(0,0,size,size);};tmp.src=url;
}

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(typeof r==='object'?r[0]:r,w/2,h/2);if(r<0)r=0;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this;
  };
}

async function dlPNG(){
  var btn=document.getElementById('pngBtn');
  if(btn){btn.classList.add('ld');btn.innerHTML='<span class="material-icons-round">hourglass_top</span>…';}
  try{
    var sc=3,can=document.createElement('canvas');
    can.width=cvSize*sc;can.height=cvSize*sc;
    var ctx=can.getContext('2d');ctx.scale(sc,sc);
    var rPx=parseFloat(BG.radius)/100*cvSize;
    function clip(){ctx.beginPath();ctx.roundRect(0,0,cvSize,cvSize,rPx);ctx.closePath();ctx.clip();}
    // Background
    if(BG.type!=='none'){
      ctx.save();clip();
      if(BG.type==='solid'){ctx.fillStyle=BG.color;ctx.fill();}
      else{var m=BG.grad.match(/#[0-9a-fA-F]{6}/g)||['#e05c2a','#f0a06e'];var g=ctx.createLinearGradient(0,0,cvSize,cvSize);g.addColorStop(0,m[0]);g.addColorStop(1,m[1]||m[0]);ctx.fillStyle=g;ctx.fill();}
      ctx.restore();
    }
    // Render each visible layer
    for(var li=0;li<layers.length;li++){
      var layer=layers[li];
      if(!layer.visible)continue;
      ctx.save();clip();
      ctx.globalAlpha=layer.opacity/100;
      ctx.globalCompositeOperation=layer.blend==='normal'?'source-over':layer.blend;
      var cx=cvSize*layer.x/100,cy=cvSize*layer.y/100;
      ctx.translate(cx,cy);
      ctx.rotate(layer.rot*Math.PI/180);
      if(layer.flipX)ctx.scale(-1,1);
      var off2=layer.size/2;
      await renderLayerToCtx(ctx,layer,-off2,-off2);
      ctx.restore();
    }
    var dataUrl=can.toDataURL('image/png');
    var a=document.createElement('a');a.download='reiicons.png';a.href=dataUrl;a.click();
    toast('✓ PNG сохранён — 3× разрешение');
  }catch(e){console.error(e);toast('Ошибка экспорта','err');}
  if(btn){btn.classList.remove('ld');btn.innerHTML='<span class="material-icons-round">download</span>PNG';}
}

async function renderLayerToCtx(ctx,layer,ox,oy){
  var size=layer.size;
  if(layer.aiUrl){
    var col=hexToRgb(layer.color);
    await new Promise(function(res){
      var tmp=new Image();tmp.crossOrigin='anonymous';
      tmp.onload=function(){
        try{
          var off=document.createElement('canvas');off.width=size;off.height=size;
          var octx=off.getContext('2d');octx.drawImage(tmp,0,0,size,size);
          var id=octx.getImageData(0,0,size,size),d=id.data;
          for(var i=0;i<d.length;i+=4){var lum=d[i]*.299+d[i+1]*.587+d[i+2]*.114,a=Math.round((1-lum/255)*255*(d[i+3]/255));d[i]=col.r;d[i+1]=col.g;d[i+2]=col.b;d[i+3]=a;}
          octx.putImageData(id,0,0);ctx.drawImage(off,ox,oy,size,size);
        }catch(e){ctx.drawImage(tmp,ox,oy,size,size);}res();
      };tmp.onerror=function(){res();};tmp.src=layer.aiUrl;
    });
    return;
  }
  if(layer.src==='ify'){
    var parts=layer.icon.split(':');
    if(parts.length===2){
      await new Promise(function(res){
        fetch('https://api.iconify.design/'+parts[0]+'/'+parts[1]+'.svg?color='+layer.color.replace('#','%23')+'&width='+size+'&height='+size)
          .then(function(r){return r.text();})
          .then(function(svg){
            var blob=new Blob([svg],{type:'image/svg+xml'});
            var url=URL.createObjectURL(blob);
            var im=new Image();
            im.onload=function(){ctx.drawImage(im,ox,oy,size,size);URL.revokeObjectURL(url);res();};
            im.onerror=function(){URL.revokeObjectURL(url);res();};
            im.src=url;
          }).catch(res);
      });
    }
    return;
  }
  if(layer.src==='ph'){
    await new Promise(function(res){
      fetch('https://unpkg.com/@phosphor-icons/core@2.1.1/assets/regular/'+layer.icon+'.svg')
        .then(function(r){return r.text();})
        .then(function(svg){
          var colored=svg.replace(/fill="[^"]*"/g,'fill="'+layer.color+'"').replace(/stroke="[^"]*"/g,'stroke="'+layer.color+'"').replace(/currentColor/g,layer.color).replace(/<svg([^>]*)>/,'<svg$1 width="'+size+'" height="'+size+'">');
          var blob=new Blob([colored],{type:'image/svg+xml'});var url=URL.createObjectURL(blob);
          var im=new Image();im.onload=function(){ctx.drawImage(im,ox,oy,size,size);URL.revokeObjectURL(url);res();};im.onerror=function(){URL.revokeObjectURL(url);res();};im.src=url;
        }).catch(res);
    });
    return;
  }
  // Font icons (mr, ms)
  var fam=layer.src==='ms'?'"Material Symbols Rounded"':'"Material Icons Round"';
  try{await document.fonts.load(size+'px '+fam);}catch(e){}
  ctx.fillStyle=layer.color;
  ctx.font=size+'px '+fam;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(layer.icon,ox+size/2,oy+size/2);
}

function cpCSS(){
  var rPx=Math.round(parseFloat(BG.radius)/100*cvSize);
  var bg=BG.type==='solid'?'background:'+BG.color+';':BG.type==='gradient'?'background:'+BG.grad+';':'background:transparent;';
  var sh=BG.shadow?'\n  box-shadow:0 16px 48px rgba(0,0,0,.4);':'';
  navigator.clipboard.writeText('.icon{width:'+cvSize+'px;height:'+cvSize+'px;'+bg+'\n  border-radius:'+rPx+'px;\n  display:flex;align-items:center;justify-content:center;'+sh+'\n}').then(function(){toast('✓ CSS скопирован');});
}
function cpSVG(){
  var rPx=Math.round(parseFloat(BG.radius)/100*cvSize);
  var bg='';
  if(BG.type==='solid')bg='<rect width="'+cvSize+'" height="'+cvSize+'" rx="'+rPx+'" fill="'+BG.color+'"/>';
  navigator.clipboard.writeText('<svg xmlns="http://www.w3.org/2000/svg" width="'+cvSize+'" height="'+cvSize+'">'+bg+'</svg>').then(function(){toast('✓ SVG скопирован');});
}

// ─── COLOR PICKER ────────────────────────────────────────────────────────────
var CP={target:null,h:15,s:75,v:89,hex:'#e05c2a'};
var CP_SW=['#e05c2a','#e8403a','#e84086','#a040e8','#4040e8','#4096e8','#40c8e8','#40e884','#a0e840','#e8c840','#ffffff','#f0eff4','#aaaaaa','#555555','#222222','#111113','#0d1117','#1a1a2e','#16213e','#0f3460'];

function hsvToHex(h,s,v){s/=100;v/=100;var f=function(n){var k=(n+h/60)%6;return v-v*s*Math.max(0,Math.min(k,4-k,1));};return'#'+[f(5),f(3),f(1)].map(function(x){return Math.round(x*255).toString(16).padStart(2,'0');}).join('');}
function hexToHsv(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];var r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;var max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;var h=0,s=max===0?0:d/max,v=max;if(d!==0){switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}return{h:Math.round(h*360),s:Math.round(s*100),v:Math.round(v*100)};}

function cpUpdate(){CP.hex=hsvToHex(CP.h,CP.s,CP.v);document.getElementById('cpSlBg').style.background='hsl('+CP.h+',100%,50%)';document.getElementById('cpPrev').style.background=CP.hex;document.getElementById('cpHex').value=CP.hex.toUpperCase();document.getElementById('cpTh').style.left=CP.s+'%';document.getElementById('cpTh').style.top=(100-CP.v)+'%';document.getElementById('cpTh').style.background=CP.hex;document.getElementById('cpHth').style.left=(CP.h/360*100)+'%';}

function openPicker(target){
  CP.target=target;
  var titles={bg:'Цвет фона',ic:'Цвет иконки',cg1:'Цвет 1',cg2:'Цвет 2'};
  document.getElementById('cpTitle').textContent=titles[target]||'Цвет';
  var cur=target==='bg'?BG.color:target==='cg1'?cgC1:target==='cg2'?cgC2:(selLayer()||{color:'#ffffff'}).color;
  var hsv=hexToHsv(cur);CP.h=hsv.h;CP.s=hsv.s;CP.v=hsv.v;
  document.getElementById('cpSws').innerHTML=CP_SW.map(function(c){return '<div class="cp-sw" style="background:'+c+'" onclick="cpSwatch(this)" data-c="'+c+'"></div>';}).join('');
  cpUpdate();document.getElementById('cpOv').classList.add('open');
}
function closePicker(){document.getElementById('cpOv').classList.remove('open');}
function cpSwatch(el){var hsv=hexToHsv(el.dataset.c);CP.h=hsv.h;CP.s=hsv.s;CP.v=hsv.v;cpUpdate();}
function confirmPicker(){
  closePicker();
  var t=CP.target,hex=CP.hex,sl=selLayer();
  if(t==='bg'){BG.color=hex;}
  else if(t==='ic'){if(sl)sl.color=hex;}
  else if(t==='cg1'){cgC1=hex;}
  else if(t==='cg2'){cgC2=hex;}
  render();
}

(function(){
  var sl=document.getElementById('cpSL'),dr=false;
  function set(x,y){var r=sl.getBoundingClientRect();CP.s=Math.round(Math.max(0,Math.min(1,(x-r.left)/r.width))*100);CP.v=Math.round((1-Math.max(0,Math.min(1,(y-r.top)/r.height)))*100);cpUpdate();}
  sl.addEventListener('mousedown',function(e){dr=true;set(e.clientX,e.clientY);e.preventDefault();});
  sl.addEventListener('touchstart',function(e){dr=true;set(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
  document.addEventListener('mousemove',function(e){if(dr)set(e.clientX,e.clientY);});
  document.addEventListener('touchmove',function(e){if(dr)set(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('mouseup',function(){dr=false;});document.addEventListener('touchend',function(){dr=false;});
})();
(function(){
  var hue=document.getElementById('cpHue'),dr=false;
  function set(x){var r=hue.getBoundingClientRect();CP.h=Math.round(Math.max(0,Math.min(1,(x-r.left)/r.width))*360);cpUpdate();}
  hue.addEventListener('mousedown',function(e){dr=true;set(e.clientX);e.preventDefault();});
  hue.addEventListener('touchstart',function(e){dr=true;set(e.touches[0].clientX);e.preventDefault();},{passive:false});
  document.addEventListener('mousemove',function(e){if(dr)set(e.clientX);});
  document.addEventListener('touchmove',function(e){if(dr)set(e.touches[0].clientX);},{passive:true});
  document.addEventListener('mouseup',function(){dr=false;});document.addEventListener('touchend',function(){dr=false;});
})();
document.getElementById('cpHex').addEventListener('input',function(e){var v=e.target.value.trim();if(!v.startsWith('#'))v='#'+v;if(/^#[0-9a-fA-F]{6}$/.test(v)){var hsv=hexToHsv(v);CP.h=hsv.h;CP.s=hsv.s;CP.v=hsv.v;cpUpdate();}});

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type==='err'?' err':type==='ai'?' ai':'');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}

// ─── INIT ────────────────────────────────────────────────────────────────────
layers=[mkLayer({src:'mr',icon:'auto_awesome',x:50,y:50,size:64,color:'#ffffff'})];
selId=layers[0].id;
render();
</script>
